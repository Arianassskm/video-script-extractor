<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Subtitle Extractor</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1 class="title">YT Subtitle Extractor</h1>
      <span class="platform-badge" id="platformBadge">Detecting...</span>
    </header>

    <!-- Controls -->
    <div class="controls">
      <div class="control-row">
        <select id="languageSelect" class="select" disabled>
          <option value="">Select Language</option>
        </select>
        <button id="extractBtn" class="btn btn-primary">Extract</button>
      </div>
      <div class="control-row">
        <input type="text" id="searchInput" class="input" placeholder="Search keywords..." disabled>
      </div>
    </div>

    <div class="helper-card">
      <div class="helper-title">Fallback (Local yt-dlp Helper)</div>
      <div class="control-row">
        <input id="helperUrlInput" class="input" value="http://127.0.0.1:8765" placeholder="Local Helper URL">
      </div>
      <div class="control-row">
        <button id="helperExtractBtn" class="btn btn-secondary">Extract Subs (Local)</button>
        <button id="helperAudioBtn" class="btn btn-secondary">Get Audio Link</button>
      </div>
      <div id="audioLinkRow" class="audio-link-row hidden">
        <input id="audioLinkInput" class="input" readonly>
        <button id="copyAudioBtn" class="btn btn-sm">Copy</button>
      </div>
    </div>

    <!-- Status -->
    <div id="statusArea" class="status"></div>

    <!-- Transcript Display -->
    <div id="transcriptArea" class="transcript-area" style="display: none;">
      <div class="transcript-header">
        <span id="lineCount" class="line-count"></span>
        <div class="export-buttons">
          <button id="copyBtn" class="btn btn-sm" title="Copy to clipboard">Copy</button>
          <button id="exportTxtBtn" class="btn btn-sm" title="Export as TXT">TXT</button>
          <button id="exportMdBtn" class="btn btn-sm" title="Export as Markdown">MD</button>
        </div>
      </div>
      <div id="transcriptContent" class="transcript-content"></div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span>Local Processing &middot; Privacy First</span>
    </footer>
  </div>

  <script src="../extractors/youtube.js"></script>
  <script src="../extractors/bilibili.js"></script>
  <script src="popup.js"></script>
</body>
</html>
